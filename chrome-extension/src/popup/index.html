<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>INTERLOCK</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 260px;
        background: #1c1c1f;
        color: #e8eaed;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .logo {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background: linear-gradient(135deg, #f43f5e, #a855f7);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 16px;
      }
      .title {
        font-weight: 600;
      }
      .sub {
        font-size: 10.5px;
        color: #9aa0a6;
      }
      p {
        font-size: 12px;
        color: #bdc1c6;
        line-height: 1.5;
      }
      button {
        all: unset;
        display: block;
        width: 100%;
        padding: 9px 12px;
        background: #8ab4f8;
        color: #202124;
        border-radius: 6px;
        text-align: center;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
      }
      a {
        display: block;
        font-size: 11px;
        color: #8ab4f8;
        margin-top: 8px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="logo">◆</div>
      <div>
        <div class="title">INTERLOCK</div>
        <div class="sub">CFO Wire-Fraud Defense</div>
      </div>
    </div>
    <p>
      Join any Meet call. INTERLOCK will appear at the top of the page and
      stream frames to the detector. Open the side panel to see the live
      Workspace add-on.
    </p>
    <button id="open">Open INTERLOCK side panel</button>
    <a href="https://interlock-mu.vercel.app/how-it-connects" target="_blank"
      >How it connects to Meet →</a
    >
    <script>
      document.getElementById("open").addEventListener("click", async () => {
        const [tab] = await chrome.tabs.query({
          active: true,
          currentWindow: true,
        });
        if (tab?.id) {
          await chrome.sidePanel.open({ tabId: tab.id });
          window.close();
        }
      });
    </script>
  </body>
</html>
